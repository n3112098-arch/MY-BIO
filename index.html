<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barni | Bio</title>
    <!-- Подключаем иконки FontAwesome для красивых логотипов соцсетей -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #060409 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 35px 25px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(45deg, #0088cc, #ff0050);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .nickname {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        /* Эффект заблюренного имени */
        .blurred-name-container {
            margin-bottom: 12px;
        }

        .blurred-name {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            filter: blur(5px);
            transition: filter 0.4s ease, background 0.4s ease;
            cursor: pointer;
            user-select: none;
        }

        .blurred-name:hover, .blurred-name:active {
            filter: blur(0px);
            background: rgba(255, 255, 255, 0.15);
        }

        .info {
            font-size: 15px;
            color: #b3b3b3;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            text-decoration: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-tg {
            background: #0088cc;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }

        .btn-tt {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.15);
        }

        .btn i {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- Аватарка (первая буква ника, если нет картинки) -->
        <div class="avatar">B</div>
        
        <!-- Никнейм -->
        <div class="nickname">Barni</div>
        
        <!-- Заблюренное место имени (открывается при клике/наведении) -->
        <div class="blurred-name-container">
            <span class="blurred-name" title="Нажми, чтобы увидеть">Никита</span>
        </div>
        
        <!-- Возраст и страна -->
        <div class="info">16 y.o — Ukraine</div>
        
        <!-- Кнопки-ссылки -->
        <div class="links-container">
            <a href="https://t.me/oltiariqliy" target="_blank" class="btn btn-tg">
                <i class="fa-brands fa-telegram"></i> Telegram
            </a>
            <a href="https://www.tiktok.com/@oltiariqliy" target="_blank" class="btn btn-tt">
                <i class="fa-brands fa-tiktok"></i> TikTok
            </a>
        </div>
    </div>

</body>
</html>
