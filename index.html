<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barni | Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0c;
            color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Задний фон с мягким градиентным свечением */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        /* Основная карточка */
        .profile-card {
            background: rgba(18, 18, 24, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease forwards;
        }

        /* Никнейм */
        .nickname {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        /* Краткий статус/описание */
        .status {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 24px;
            font-weight: 400;
        }

        /* Разделитель */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin-bottom: 24px;
        }

        /* Блок с инфо */
        .info-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .info-item {
            font-size: 15px;
            color: #e5e7eb;
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .info-label {
            color: #6b7280;
        }

        /* Кнопки ссылок */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-link {
            display: block;
            text-decoration: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #6366f1;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #e5e7eb;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* Анимация появления */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="profile-card">
        <div class="nickname">#Barni</div>
        <div class="status">Coding & Creating</div>
        
        <div class="divider"></div>
        
        <div class="info-group">
            <div class="info-item">
                <span class="info-label">Имя</span>
                <span>Никита</span>
            </div>
            <div class="info-item">
                <span class="info-label">Локация</span>
                <span>Украина 🇺🇦</span>
            </div>
            <div class="info-item">
                <span class="info-label">Стек</span>
                <span>Python / JS / HTML</span>
            </div>
        </div>

        <div class="links-container">
            <a href="https://t.me/oltiariqliy" class="btn-link btn-primary" target="_blank">Telegram</a>
            <a href="https://github.com/n3112098-arch" class="btn-link btn-secondary" target="_blank">GitHub</a>
        </div>
    </div>

</body>
</html>
