<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barni | Developer Bio</title>
    <style>
        :root {
            --main-color: #00ff41; /* Цвет классической матрицы */
            --bg-color: #0a0a0a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--main-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .terminal {
            width: 90%;
            max-width: 500px;
            background: #000;
            padding: 25px;
            border: 1px solid var(--main-color);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border-radius: 5px;
            position: relative;
        }
        .terminal::before {
            content: "system_root@barni:~$";
            display: block;
            margin-bottom: 15px;
            opacity: 0.7;
        }
        .line { margin-bottom: 10px; display: block; }
        .label { color: #fff; font-weight: bold; }
        .value { color: var(--main-color); }
        .love-link {
            display: inline-block;
            margin-top: 15px;
            padding: 5px 10px;
            border: 1px solid #ff4b2b;
            color: #ff4b2b;
            text-decoration: none;
            transition: 0.3s;
        }
        .love-link:hover {
            background: #ff4b2b;
            color: #fff;
            box-shadow: 0 0 10px #ff4b2b;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: var(--main-color);
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0; } 
        }
    </style>
</head>
<body>

<div class="terminal">
    <div id="output"></div>
    <span class="cursor"></span>
</div>

<script>
    const user = {
        username: "#Barni",
        name: "Никита",
        age: 16,
        birthday: "05.01.2010",
        country: "Украина 🇺🇦",
        love: "@soneklelele"
    };

    const lines = [
        { label: "User", value: user.username },
        { label: "Name", value: user.name },
        { label: "Age", value: `${user.age} (${user.birthday})` },
        { label: "Location", value: user.country },
        { label: "Status", value: "Coding in progress..." }
    ];

    const output = document.getElementById('output');

    // Функция для эффекта печатающегося текста
    function printBio() {
        lines.forEach((line, index) => {
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerHTML = `<span class="label">> ${line.label}:</span> <span class="value">${line.value}</span>`;
                output.appendChild(div);

                // Если это последняя строка, добавляем ссылку на лове
                if (index === lines.length - 1) {
                    setTimeout(() => {
                        output.innerHTML += `<a href="https://t.me/${user.love.replace('@','')}" class="love-link">❤ лове: ${user.love}</a>`;
                    }, 500);
                }
            }, index * 400); // Задержка между строками
        });
    }

    printBio();
</script>

</body>
</html>
